services:
  model-card:
    build: .
    ports:
      - "8080:8080"
    environment:
      AIHUB_LICENSE_KEY: "${AIHUB_LICENSE_KEY}"
      AIHUB_HARDWARE_FINGERPRINT: "${AIHUB_HARDWARE_FINGERPRINT:-local-dev-device}"

  open-webui:
    image: "${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}"
    depends_on:
      - model-card
    ports:
      - "3000:8080"
    environment:
      WEBUI_AUTH: "${WEBUI_AUTH:-False}"
      OPENAI_API_BASE_URL: "http://model-card:8080/v1"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-aihub-local-client-placeholder}"
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
