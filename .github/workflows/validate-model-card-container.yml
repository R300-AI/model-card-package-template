name: validate-model-card-container

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run preflight
        run: python -m tools.preflight

      - name: Build Docker image
        shell: bash
        run: |
          mapfile -t AIHUB_OCI_LABEL_ARGS < <(python -m tools.generate_oci_labels --format docker-build-args)
          docker build -t aihub/model-card-package-template:test "${AIHUB_OCI_LABEL_ARGS[@]}" .

      - name: Validate OCI labels
        shell: bash
        run: |
          python -m tools.generate_oci_labels > expected-oci-labels.txt
          while IFS='=' read -r key expected; do
            actual="$(docker image inspect aihub/model-card-package-template:test --format "{{ index .Config.Labels \"$key\" }}")"
            test "$actual" = "$expected"
          done < expected-oci-labels.txt

      - name: Validate compiled guard in runtime image
        run: |
          docker run --rm aihub/model-card-package-template:test sh -c 'test ! -f /app/license_guard/guard.py && ls /app/license_guard/guard*.so'

      - name: Validate Open WebUI compose file
        run: docker compose -f docker-compose.open-webui.yml config
