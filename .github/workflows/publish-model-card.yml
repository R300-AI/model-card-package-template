name: publish-model-card

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      IMAGE_URI: ${{ vars.AIHUB_ACR_LOGIN_SERVER }}/${{ vars.AIHUB_IMAGE_REPOSITORY }}:${{ vars.AIHUB_IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate publish settings
        env:
          AIHUB_ACR_LOGIN_SERVER: ${{ vars.AIHUB_ACR_LOGIN_SERVER }}
          AIHUB_IMAGE_REPOSITORY: ${{ vars.AIHUB_IMAGE_REPOSITORY }}
          AIHUB_IMAGE_TAG: ${{ vars.AIHUB_IMAGE_TAG }}
          AIHUB_CARD_ID: ${{ vars.AIHUB_CARD_ID }}
          AIHUB_PUBLISH_GRANT_ID: ${{ vars.AIHUB_PUBLISH_GRANT_ID }}
          AIHUB_CALLBACK_URL: ${{ vars.AIHUB_CALLBACK_URL }}
          AIHUB_ACR_USERNAME: ${{ secrets.AIHUB_ACR_USERNAME }}
          AIHUB_ACR_PASSWORD: ${{ secrets.AIHUB_ACR_PASSWORD }}
          AIHUB_CALLBACK_TOKEN: ${{ secrets.AIHUB_CALLBACK_TOKEN }}
        run: python -m tools.validate_config --check-publish-env

      - name: Run tests
        env:
          AIHUB_LICENSE_KEY: ${{ secrets.AIHUB_TEST_LICENSE_KEY }}
        run: python -m pytest -q

      - name: Build Docker image
        shell: bash
        run: |
          mapfile -t AIHUB_OCI_LABEL_ARGS < <(python -m tools.generate_oci_labels --format docker-build-args)
          docker build -t "$IMAGE_URI" "${AIHUB_OCI_LABEL_ARGS[@]}" .

      - name: Validate OCI labels
        shell: bash
        run: |
          python -m tools.generate_oci_labels > expected-oci-labels.txt
          while IFS='=' read -r key expected; do
            actual="$(docker image inspect "$IMAGE_URI" --format "{{ index .Config.Labels \"$key\" }}")"
            test "$actual" = "$expected"
          done < expected-oci-labels.txt

      - name: Validate compiled guard in runtime image
        run: docker run --rm "$IMAGE_URI" sh -c 'test ! -f /app/license_guard/guard.py && ls /app/license_guard/guard*.so'

      - name: Login to AI Hub ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.AIHUB_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AIHUB_ACR_USERNAME }}
          password: ${{ secrets.AIHUB_ACR_PASSWORD }}

      - name: Push Docker image
        run: docker push "$IMAGE_URI"

      - name: Resolve pushed image digest
        id: digest
        shell: bash
        run: |
          DIGEST="$(docker buildx imagetools inspect "$IMAGE_URI" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ vars.AIHUB_ACR_LOGIN_SERVER }}/${{ vars.AIHUB_IMAGE_REPOSITORY }}@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Report publish result to AI Hub
        env:
          AIHUB_PUBLISH_GRANT_ID: ${{ vars.AIHUB_PUBLISH_GRANT_ID }}
          AIHUB_CARD_ID: ${{ vars.AIHUB_CARD_ID }}
          AIHUB_IMAGE_REPOSITORY: ${{ vars.AIHUB_IMAGE_REPOSITORY }}
          AIHUB_IMAGE_TAG: ${{ vars.AIHUB_IMAGE_TAG }}
          AIHUB_CALLBACK_URL: ${{ vars.AIHUB_CALLBACK_URL }}
          AIHUB_CALLBACK_TOKEN: ${{ secrets.AIHUB_CALLBACK_TOKEN }}
        run: |
          python -m tools.report_publish_result \
            --image-digest "${{ steps.digest.outputs.image_digest }}" \
            --image-uri "${{ steps.digest.outputs.image_ref }}"
